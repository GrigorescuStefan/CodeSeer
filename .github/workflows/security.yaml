name: Security Scan Pipeline

on:
  push:
    branches:
      - main
      - dev

jobs:
  security-scan:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install bandit

      - name: Run Static Analysis (Bandit)
        run: |
          bandit -r ./samples -f json -o report.json || true

      - name: Generate HTML Report (Clickable UI)
        run: |
          python scanner/report_generator.py

      - name: Evaluate Security Report (Policy Engine)
        run: |
          python scanner/evaluate.py
        continue-on-error: true

      - name: Upload JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-json
          path: report.json

      - name: Upload HTML Report (UI)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-html
          path: report.html